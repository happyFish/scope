name: Deploy to fal

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - main
          - prod
        default: 'main'
      app:
        description: 'Which app to deploy'
        required: true
        type: choice
        options:
          - both
          - scope-app
          - scope-livepeer
        default: 'both'
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only run if triggered manually OR if the docker build succeeded
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Use the SHA from the triggering workflow for workflow_run events
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install fal
        run: pip install fal

      - name: Deploy Scope app to fal
        if: >
          github.event_name == 'workflow_run' ||
          github.event.inputs.app == 'both' ||
          github.event.inputs.app == 'scope-app'
        env:
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: |
          # Use input environment for manual dispatch, default to main for workflow_run
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          else
            ENV="main"
          fi

          echo "Deploying Scope app to $ENV"
          fal deploy --env $ENV --auth public src/scope/cloud/fal_app.py

      - name: Deploy Livepeer runner to fal
        if: >
          github.event_name == 'workflow_run' ||
          github.event.inputs.app == 'both' ||
          github.event.inputs.app == 'scope-livepeer'
        env:
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: |
          # Use input environment for manual dispatch, default to main for workflow_run
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          else
            ENV="main"
          fi

          echo "Deploying Livepeer runner to $ENV as scope-livepeer"
          fal deploy \
            --app-name scope-livepeer \
            --env $ENV \
            --auth private \
            src/scope/cloud/livepeer_fal_app.py
