name: Build Docker Image

on:
  workflow_call:
    inputs:
      variant:
        required: true
        type: string
      suffix:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      description:
        required: true
        type: string
    outputs:
      short_sha:
        value: ${{ jobs.build.outputs.short_sha }}
      pr_number:
        value: ${{ jobs.build.outputs.pr_number }}

jobs:
  build:
    name: build ${{ inputs.variant }}
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}
      pr_number: ${{ steps.meta.outputs.pr_number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Clean up before build
        run: |
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          echo "Disk usage before build:"
          df -h

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: daydreamlive
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "short_sha=$(echo '${{ github.event.pull_request.head.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT
            echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "short_sha=$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT
            echo "pr_number=" >> $GITHUB_OUTPUT
          fi

      - name: Set image tag
        id: tag
        run: |
          DOCKERHUB="daydreamlive/scope"
          GHCR="ghcr.io/daydreamlive/scope"
          SUFFIX="${{ inputs.suffix }}"

          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Manual dispatch: use provided version + latest
            VERSION="${{ github.event.inputs.version }}"
            TAGS="$DOCKERHUB:$VERSION$SUFFIX,$DOCKERHUB:latest$SUFFIX"
            TAGS="$TAGS,$GHCR:$VERSION$SUFFIX,$GHCR:latest$SUFFIX"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Git tag: extract version (e.g., v0.1.0 -> 0.1.0) + latest
            VERSION_TAG="${{ github.ref_name }}"
            VERSION="${VERSION_TAG#v}"  # Remove 'v' prefix if present
            TAGS="$DOCKERHUB:$VERSION$SUFFIX,$DOCKERHUB:latest$SUFFIX"
            TAGS="$TAGS,$GHCR:$VERSION$SUFFIX,$GHCR:latest$SUFFIX"
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            # Main branch
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            TAGS="$DOCKERHUB:main$SUFFIX,$DOCKERHUB:$SHORT_SHA$SUFFIX"
            TAGS="$TAGS,$GHCR:main$SUFFIX,$GHCR:$SHORT_SHA$SUFFIX"
          elif [ "${{ github.ref }}" == "refs/heads/runpod-serverless" ]; then
            # Runpod serverless branch
            TAGS="$DOCKERHUB:runpod-serverless$SUFFIX"
            TAGS="$TAGS,$GHCR:runpod-serverless$SUFFIX"
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            # Pull request: use sanitized branch name + short SHA
            BRANCH_TAG=$(echo "${{ github.head_ref }}" | sed 's/\//-/g')
            SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
            TAGS="$DOCKERHUB:$BRANCH_TAG$SUFFIX,$DOCKERHUB:$SHORT_SHA$SUFFIX"
            TAGS="$TAGS,$GHCR:$BRANCH_TAG$SUFFIX,$GHCR:$SHORT_SHA$SUFFIX"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and push ${{ inputs.variant }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tag.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/daydreamlive/scope
            org.opencontainers.image.description=${{ inputs.description }}
            org.opencontainers.image.licenses=MIT
          build-args: |
            VITE_POSTHOG_KEY=${{ secrets.VITE_POSTHOG_KEY }}
            VITE_MIXPANEL_TOKEN=${{ secrets.VITE_MIXPANEL_TOKEN }}
          cache-from: type=gha,scope=${{ inputs.variant }}
          cache-to: type=gha,mode=max,scope=${{ inputs.variant }}
